name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Git LFS
        run: git lfs install

      - name: Validate HF token permissions
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret is not set in GitHub repo settings."
            exit 1
          fi
          CLEAN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '[:space:]')
          echo "Token length: ${#CLEAN_TOKEN}"

          # Check token is valid via HF whoami endpoint (always returns 200 for valid tokens)
          echo "Verifying token via HF API..."
          HTTP_STATUS=$(curl -s -o /tmp/hf_whoami.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CLEAN_TOKEN}" \
            "https://huggingface.co/api/whoami-v2")
          echo "HF API status: $HTTP_STATUS"
          cat /tmp/hf_whoami.txt | python3 -c "import sys,json; d=json.load(sys.stdin); print('User:', d.get('name','unknown'))" 2>/dev/null || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: HF_TOKEN is invalid or expired (HTTP $HTTP_STATUS). Please create a new WRITE token at https://huggingface.co/settings/tokens"
            exit 1
          fi
          echo "Token is valid."

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          CLEAN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '[:space:]')
          # Space name is case-sensitive: vivek231/adaptive-rag (all lowercase)
          echo "Pushing to HuggingFace Space vivek231/adaptive-rag ..."
          git push "https://user:${CLEAN_TOKEN}@huggingface.co/spaces/vivek231/adaptive-rag" HEAD:main --force
          echo "Done. Exit code: $?"
