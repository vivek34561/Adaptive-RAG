name: CI/CD — Docker Hub + Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Job 1: Build & push Docker images to Docker Hub ─────────────────────────
  docker:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Free up disk space (GitHub runners are tight on space for large images)
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend image ───────────────────────────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/adaptive-rag-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/adaptive-rag-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Frontend image ──────────────────────────────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/adaptive-rag-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/adaptive-rag-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ── Job 2: Deploy to Hugging Face Spaces ─────────────────────────────────
  deploy-hf:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Git LFS
        run: git lfs install

      - name: Validate HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret is not set."
            exit 1
          fi
          CLEAN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '[:space:]')
          HTTP_STATUS=$(curl -s -o /tmp/hf_whoami.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CLEAN_TOKEN}" \
            "https://huggingface.co/api/whoami-v2")
          cat /tmp/hf_whoami.txt | python3 -c "import sys,json; d=json.load(sys.stdin); print('HF user:', d.get('name','unknown'))" 2>/dev/null || true
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: HF_TOKEN is invalid (HTTP $HTTP_STATUS). Create a WRITE token at https://huggingface.co/settings/tokens"
            exit 1
          fi

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          CLEAN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '[:space:]')
          git push "https://user:${CLEAN_TOKEN}@huggingface.co/spaces/vivek231/adaptive-rag" HEAD:main --force
          echo "Deployed to HuggingFace Spaces."
